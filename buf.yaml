version: v1

breaking:
  ignore_unstable_packages: true

lint:
  use:
    - STANDARD
    - COMMENTS
  ignore_only:
    COMMENT_ENUM_VALUE:
      - api/common/v1/common.proto
      - api/content/v1/models.proto
    COMMENT_FIELD:
      - api/common/v1/common.proto
      - api/content/v1/beacon/beacon.proto
      - api/content/v1/forge/forge.proto
      - api/content/v1/models.proto
      - api/content/v1/nexus/nexus.proto
      - api/content/v1/oracle/oracle.proto
      - api/search/v1/mirror.proto
    COMMENT_MESSAGE:
      - api/content/v1/beacon/beacon.proto
      - api/content/v1/forge/forge.proto
      - api/content/v1/models.proto
      - api/content/v1/nexus/nexus.proto
      - api/content/v1/oracle/oracle.proto
      - api/search/v1/mirror.proto
    COMMENT_RPC:
      - api/content/v1/beacon/beacon.proto
    IMPORT_USED:
      - api/content/v1/beacon/beacon.proto
    PACKAGE_DIRECTORY_MATCH:
      - api/common/v1/common.proto
      - api/content/v1/beacon/beacon.proto
      - api/content/v1/forge/forge.proto
      - api/content/v1/models.proto
      - api/content/v1/nexus/nexus.proto
      - api/content/v1/oracle/oracle.proto
      - api/search/v1/mirror.proto
    PACKAGE_VERSION_SUFFIX:
      - api/content/v1/beacon/beacon.proto
      - api/content/v1/forge/forge.proto
      - api/content/v1/nexus/nexus.proto
      - api/content/v1/oracle/oracle.proto

deps:
  - buf.build/googleapis/googleapis
