# Beacon (Read Service) 统一配置

app:
  name: bifrost-beacon
  version: 1.0.0
  env: dev

logger:
  level: info
  format: json

observability:
  otlp_endpoint: "localhost:4317"

server:
  grpc_addr: ":9002"
  graceful_shutdown_timeout: 10s

data:
  database:
    dsn: "host=localhost user=postgres password=postgres dbname=bifrost port=5432 sslmode=disable TimeZone=Asia/Shanghai"
    max_idle_conns: 20
    max_open_conns: 200
    max_lifetime: 1h

  redis:
    addr: "localhost:6379"
    password: ""
    db: 0
    read_timeout: 3s
    write_timeout: 3s
    pool_size: 20
    min_idle_conns: 5

messenger:
  addr: "nats://127.0.0.1:4222"
