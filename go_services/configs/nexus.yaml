# Nexus (Write Service) 统一配置

app:
  name: bifrost-nexus
  version: 1.0.0
  env: dev

logger:
  level: info
  format: json

observability:
  otlp_endpoint: "localhost:4317"

server:
  grpc_addr: ":9001"

security:
  jwt_secret: "your-secret-key-change-in-production"
  jwt_expiration: 24h

snowflake_node: 1

data:
  database:
    driver: "pgx"
    dsn: "host=localhost user=postgres password=postgres dbname=bifrost port=5432 sslmode=disable TimeZone=Asia/Shanghai"
    max_idle_conns: 10
    max_open_conns: 100
    conn_max_lifetime: 1h
    conn_max_idle_time: 5m

messenger:
  addr: "nats://127.0.0.1:4222"

storage:
  endpoint: "minio:9000"
  access_key_id: "minioadmin"
  secret_access_key: "minioadmin"
  bucket: "bifrost-assets"
  use_ssl: false
  region: "us-east-1"

# 下游 RPC 服务地址
rpc:
  forge_addr: "" # 示例: "forge:9100"（未部署则留空以跳过渲染）
