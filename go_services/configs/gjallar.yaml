# Gjallar (Gateway) 统一配置

app:
  name: bifrost-gjallar
  version: 1.0.0
  env: dev

logger:
  level: info
  format: console

observability:
  otlp_endpoint: "localhost:4317"

http:
  addr: ":8080"
  read_timeout: 10s
  write_timeout: 10s
  timeout: 10s

rpc:
  nexus:
    addr: "127.0.0.1:9001"
    timeout: 5s
  beacon:
    addr: "127.0.0.1:9002"
    timeout: 5s
