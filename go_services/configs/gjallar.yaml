# Gjallar (Gateway) 统一配置

app:
  name: bifrost-gjallar
  version: 1.0.0
  env: dev

features:
  enable_search: true

logger:
  level: info
  format: console

observability:
  otlp_endpoint: "localhost:4317"

http:
  addr: ":8080"
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 60s
  timeout: 10s

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
    - "http://localhost:3002"

rpc:
  nexus:
    addr: "127.0.0.1:9001"
    timeout: 5s
  beacon:
    addr: "127.0.0.1:9002"
    timeout: 5s
  mirror:
    addr: "bifrost-mirror:9093"
    timeout: 5s
