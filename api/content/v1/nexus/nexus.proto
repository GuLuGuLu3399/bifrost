syntax = "proto3";

package bifrost.content.v1.nexus;

import "api/content/v1/models.proto";
import "google/api/annotations.proto";
option go_package = "github.com/gulugulu3399/bifrost/api/content/v1/nexus;nexusv1";

// ==========================================
// 用户服务 (User Service)
// ==========================================
service UserService {
  // 注册
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/v1/auth/register"
      body: "*"
    };
  }

  // 登录
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
  }

  // 修改密码
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse) {
    option (google.api.http) = {
      post: "/v1/users/password"
      body: "*"
    };
  }

  // 获取当前用户资料 (用于"编辑个人资料"页面的回显，非公开主页)
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse) {
    option (google.api.http) = {
      get: "/v1/users/profile"
    };
  }

  // 更新资料
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse) {
    option (google.api.http) = {
      put: "/v1/users/profile"
      body: "*"
    };
  }
}

// ==========================================
// 文章服务 (Post Service) - Admin Only
// ==========================================
// 内部使用：此服务仅供管理后台使用，强一致性保证
// 所有操作均支持全量数据（包括草稿、已发布、已归档状态）
service PostService {
  // [强一致性] 管理端获取文章列表 (无缓存，实时，支持所有状态)
  rpc ListDrafts(ListDraftsRequest) returns (ListDraftsResponse) {
    option (google.api.http) = {
      get: "/v1/drafts"
    };
  }

  // [强一致性] 获取文章源码 (返回 raw_markdown 供编辑器使用)
  rpc FetchSource(FetchSourceRequest) returns (FetchSourceResponse) {
    option (google.api.http) = {
      get: "/v1/admin/posts/{post_id}/source"
    };
  }

  // 创建文章
  rpc CreatePost(CreatePostRequest) returns (CreatePostResponse) {
    option (google.api.http) = {
      post: "/v1/admin/posts"
      body: "*"
    };
  }

  // 更新文章 (基本信息 + Markdown)
  rpc UpdatePost(UpdatePostRequest) returns (UpdatePostResponse) {
    option (google.api.http) = {
      put: "/v1/admin/posts/{post_id}"
      body: "*"
    };
  }

  // 删除文章
  rpc DeletePost(DeletePostRequest) returns (DeletePostResponse) {
    option (google.api.http) = {
      delete: "/v1/admin/posts/{post_id}"
    };
  }

  // [强一致性] 获取文章详情 (仅用于编辑页面回显，包含所有字段)
  rpc GetPost(GetPostRequest) returns (GetPostResponse) {
    option (google.api.http) = {
      get: "/v1/admin/posts/{post_id}"
    };
  }
}

// ==========================================
// 评论服务 (Comment Service)
// ==========================================
service CommentService {
  // 发表评论
  rpc CreateComment(CreateCommentRequest) returns (CreateCommentResponse) {
    option (google.api.http) = {
      post: "/v1/posts/{post_id}/comments"
      body: "*"
    };
  }

  // 删除评论 (作者或管理员)
  rpc DeleteComment(DeleteCommentRequest) returns (DeleteCommentResponse) {
    option (google.api.http) = {
      delete: "/v1/comments/{comment_id}"
    };
  }
}

// ==========================================
// 标签服务 (Tag Service)
// ==========================================
service TagService {

  // 删除标签 (清理操作)
  rpc DeleteTag(DeleteTagRequest) returns (DeleteTagResponse) {
    option (google.api.http) = {
      delete: "/v1/tags/{tag_id}"
    };
  }
}

// ==========================================
// 分类服务 (Category Service)
// ==========================================
service CategoryService {
  // 创建分类
  rpc CreateCategory(CreateCategoryRequest) returns (CreateCategoryResponse) {
    option (google.api.http) = {
      post: "/v1/categories"
      body: "*"
    };
  }

  // 更新分类
  rpc UpdateCategory(UpdateCategoryRequest) returns (UpdateCategoryResponse) {
    option (google.api.http) = {
      put: "/v1/categories/{category_id}"
      body: "*"
    };
  }

  // 删除分类
  rpc DeleteCategory(DeleteCategoryRequest) returns (DeleteCategoryResponse) {
    option (google.api.http) = {
      delete: "/v1/categories/{category_id}"
    };
  }

  // 获取所有分类 (管理后台用，数据量小直接返回全量)
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse) {
    option (google.api.http) = {
      get: "/v1/categories"
    };
  }
}

// [新增] 存储服务 (处理 MinIO 预签名)
service StorageService {
  // 获取上传凭证 (预签名 URL)
  // 前端/Helm 拿到 URL 后直传 MinIO
  rpc GetUploadTicket(GetUploadTicketRequest) returns (GetUploadTicketResponse) {
    option (google.api.http) = {
      post: "/v1/storage/upload_ticket"
      body: "*"
    };
  }
}

// --- 请求/响应消息定义 ---

// User Messages
message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  string nickname = 4;
}

message RegisterResponse {
  int64 user_id = 1;
}

message LoginRequest {
  string identifier = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
}

message ChangePasswordRequest {
  string old_password = 1;
  string new_password = 2;
}

message ChangePasswordResponse {
  bool success = 1;
}

message GetProfileRequest {
  int64 user_id = 1;
}

message GetProfileResponse {
  int64 user_id = 1;
  string username = 2;
  string nickname = 3;
  string bio = 4;
  string avatar_key = 5;
}

message UpdateProfileRequest {
  string nickname = 1;
  string bio = 2;
  string avatar_key = 3;
  string theme = 4;
  string language = 5;
}

message UpdateProfileResponse {
  bool success = 1;
}


// Post Messages
message CreatePostRequest {
  string title = 1;
  string slug = 2;
  string raw_markdown = 3;
  int64 category_id = 4;
  repeated string tag_names = 5;
  PostStatus status = 6;
  string cover_image_key = 7;
  string resource_key = 8;
}

message CreatePostResponse {
  int64 post_id = 1;
}

message UpdatePostRequest {
  int64 post_id = 1;
  string title = 2;
  string raw_markdown = 3;
  PostStatus status = 4;
  string cover_image_key = 5;
  string resource_key = 6;
  int64 category_id = 7;
  repeated string tag_names = 8;
}


message UpdatePostResponse {
  int64 version = 1;
}

message DeletePostRequest {
  int64 post_id = 1;
}

message DeletePostResponse {
  bool success = 1;
}

message GetPostRequest {
  int64 post_id = 1;
}

message GetPostResponse {
  Post post = 1;
}

// [内部使用] 获取文章源码 (包含 raw_markdown, status, version)
message FetchSourceRequest {
  int64 post_id = 1;
}

message FetchSourceResponse {
  int64 id = 1;
  string title = 2;
  string raw_markdown = 3;
  PostStatus status = 4;
  int64 version = 5; // 用于乐观并发控制
}

// [内部使用] 列出所有草稿和已发布文章 (管理后台用)
message ListDraftsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string keyword = 3;       // 搜标题/内容
  int64 category_id = 4;
  PostStatus status = 5;    // 可筛选状态 (DRAFT, PUBLISHED, ARCHIVED)
}

message ListDraftsResponse {
  repeated bifrost.content.v1.Post posts = 1; // 直接返回完整 Model
  int32 total_count = 2;
}

// 请求定义 (兼容旧的 ListPosts，但已重命名为 ListDrafts)
message ListPostsRequest {
  int32 page = 1;
  int32 page_size = 2;

  // 管理端筛选器
  string keyword = 3;       // 搜标题/内容
  int64 category_id = 4;
  PostStatus status = 5;    // 管理员可以搜 "DRAFT"
}

message ListPostsResponse {
  repeated bifrost.content.v1.Post posts = 1; // 直接返回完整 Model
  int32 total_count = 2;
}

// Comment Messages
message CreateCommentRequest {
  int64 post_id = 1;
  int64 parent_id = 2;
  string content = 3;
}

message CreateCommentResponse {
  int64 comment_id = 1;
  CommentStatus status = 2;
}

message DeleteCommentRequest {
  int64 comment_id = 1;
}

message DeleteCommentResponse {
  bool success = 1;
}

message DeleteTagRequest {
  int64 tag_id = 1;
}

message DeleteTagResponse {
  bool success = 1;
}

// Category Messages
message CreateCategoryRequest {
  string name = 1;
  string slug = 2;
  string description = 3;
}

message CreateCategoryResponse {
  int64 category_id = 1;
}

message UpdateCategoryRequest {
  int64 category_id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
}

message UpdateCategoryResponse {
  bool success = 1;
}

message DeleteCategoryRequest {
  int64 category_id = 1;
}

message DeleteCategoryResponse {
  bool success = 1;
}

message ListCategoriesRequest {}

message ListCategoriesResponse {
  repeated bifrost.content.v1.Category categories = 1;
}

// UploadTicket Messages
message GetUploadTicketRequest {
  string filename = 1; // 原始文件名 (如 "avatar.png")
  string usage = 2;    // 用途: "avatar", "cover", "post_image"
}

message GetUploadTicketResponse {
  string upload_url = 1; // MinIO 预签名上传链接 (带 Token)
  string object_key = 2; // 最终的文件路径 (存库用)
}